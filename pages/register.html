<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planner zilnic - Înregistrare</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="page-register">

  <header>
    <h1>Înregistrare</h1>
    <nav>
      <a href="../index.html">Acasă</a> |
      <a href="planner.html">Planner</a> |
      <a href="history.html">Istoric</a> |
      <a href="about.html">Despre</a> |
      <a href="contact.html">Contact</a>
    </nav>
    <hr>
  </header>

  <main>
    <section>
      <h2>Creează un cont</h2>

      <form id="registerForm">
        <p>
          <label for="regName">Nume:</label><br>
          <input type="text" id="regName" name="name" autocomplete="name" required />
        </p>

        <p>
          <label for="regEmail">Email:</label><br>
          <input type="email" id="regEmail" name="email" autocomplete="email" required />
        </p>

        <p>
          <label for="regPassword">Parolă:</label><br>
          <input type="password" id="regPassword" name="password" autocomplete="new-password" required />
        </p>

        <p>
          <label for="regPasswordConfirm">Confirmă parola:</label><br>
          <input type="password" id="regPasswordConfirm" name="passwordConfirm" autocomplete="new-password" required />
        </p>

        <button type="submit">Înregistrare</button>
        <p id="authError" class="form-error" aria-live="polite"></p>
      </form>

      <p class="auth-links">
        Ai deja cont? <a href="login.html">Logare</a>.
      </p>
    </section>
  </main>
  <footer>
  </footer>

  <script src="../js/auth.js" defer></script>
</body>
</html>
