<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planner zilnic - Contact</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/contact.css">
</head>
<body class="page-contact">

  <header>
    <h1>Contact</h1>
    <nav>
      <a href="../index.html">Acasă</a> |
      <a href="planner.html">Planner</a> |
      <a href="history.html">Istoric</a> |
      <a href="about.html">Despre</a> |
      <a href="contact.html">Contact</a>
    </nav>
    <hr>
  </header>

  <div class="hero">
    <img class="banner" src="../images/nokia.jpg" alt="Nokia">
  </div>

  <main>
    <section>
      <h2>Trimite un mesaj</h2>

      <p id="contactAuthHint" class="contact-note"></p>
      <p class="contact-note"><a href="login.html">Mergi la Logare</a></p>

      <form id="contactForm">
        <p>
          <label for="name">Nume:</label><br>
          <input type="text" id="name" name="name" required />
        </p>

        <p>
          <label for="email">Email:</label><br>
          <input type="email" id="email" name="email" required />
        </p>

        <p>
          <label for="message">Mesaj:</label><br>
          <textarea id="message" name="message" rows="5" required></textarea>
        </p>

        <button type="submit">Trimite</button>
      </form>

      <p id="contactStatus" class="contact-note" aria-live="polite"></p>

      <hr>

      <h2>Mesaje salvate</h2>
      <div id="messagesList" class="messages-list">
        <p class="contact-note">Nu există mesaje salvate încă.</p>
      </div>

    </section>
  </main>

  <hr>
  <footer>
  </footer>

  <script src="../js/contact-auth.js" defer></script>

</body>
</html>
